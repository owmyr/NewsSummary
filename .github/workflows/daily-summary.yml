name: Daily News Summary

on:
  schedule:
    # Runs at 09:00 UTC every day (6 AM in São Paulo)
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        type: choice
        required: true
        default: full
        options:
          - full
          - retry-failed

concurrency:
  # Prevent overlapping runs from clobbering each other's Firestore writes.
  # A scheduled run that starts while a manual retry is in progress will queue.
  group: daily-summary
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check src/daily_bot/ tests/
          ruff format --check src/daily_bot/ tests/

      - name: Run tests
        run: pytest --cov=daily_bot --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run the news summarizer
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          SOURCES: 'bbc,g1'
        run: |
          if [ "${{ inputs.mode }}" = "retry-failed" ]; then
            python -m daily_bot --retry-failed
          else
            python -m daily_bot
          fi
